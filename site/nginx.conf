server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript image/svg+xml text/html;

  # the plugin file: always fresh, always a download (users save it into the plugins folder)
  location = /Retraced.plugin.js {
    types { }
    default_type application/javascript;
    add_header Content-Disposition 'attachment; filename="Retraced.plugin.js"';
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
