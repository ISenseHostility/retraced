name: release

# On every push to main (i.e. every merge): test, build the retraced.cc site
# image, push it to the private registry, then poke the Portainer stack
# webhook so it re-pulls and redeploys.
#
# Repository secrets required:
#   REGISTRY_HOST           e.g. registry.example.com
#   REGISTRY_USERNAME       registry login
#   REGISTRY_PASSWORD       registry password or token
#   PORTAINER_WEBHOOK_URL   the stack's webhook URL from Portainer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/retraced-site:latest
            ${{ secrets.REGISTRY_HOST }}/retraced-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Redeploy the Portainer stack
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PORTAINER_WEBHOOK_URL not set — image pushed, skipping redeploy" >&2
            exit 0
          fi
          curl --fail --silent --show-error --retry 3 --retry-delay 5 -X POST "$WEBHOOK"
